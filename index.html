<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predict Shooter Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game"></canvas>
    
    <!-- 🔴 Nova Camada de UI (DOM HUD): Acelerada por GPU e fora do Canvas -->
    <div id="game-ui">
        <!-- Modal de Level Up (Oculto por padrão via classe 'hidden') -->
        <div id="level-up-modal" class="hidden">
            <h2>Level Up!</h2>
            <div id="upgrade-choices"></div>
        </div>
        
                <div id="synergy-toast" class="hidden-toast">
            <div class="toast-icon">✨</div>
            <div class="toast-content">
                <h4 id="synergy-toast-title">Sinergia Ativada</h4>
                <p id="synergy-toast-desc">Descrição do poder liberado.</p>
            </div>
        </div>

        <div id="game-over-modal" class="hidden">
            <h1 class="death-title">GAME OVER</h1>
            <p id="game-over-stats">Você alcançou o Nível 1</p>
            <button id="restart-button">TENTAR NOVAMENTE</button>
        </div>
        

        <!-- HUD Inferior: Nível, XP, Hotbar e Peso -->
        <div id="bottom-hud">
            <div id="level-text">Nível 1</div>
            
            <div id="xp-container">
                <div id="xp-bar"></div>
            </div>
            
            <div id="hotbar-wrapper">
                <div id="hotbar" class="hotbar-slots">
                    <!-- Os slots das armas serão injetados aqui pelo JavaScript -->
                </div>
                <!-- Novo container da Barra de Peso -->
                <div id="weight-bar-container"></div>
            </div>
        </div>
    </div>

    <!-- Joystick Esquerdo: Movimento -->
    <!-- Mantidos abaixo do game-ui para que o z-index natural os renderize por cima caso se cruzem -->
    <div id="joystick-move" class="joystick-base">
        <div id="stick-move" class="stick"></div>
    </div>

    <!-- Joystick Direito: Mira e Tiro Automático -->
    <div id="joystick-aim" class="joystick-base">
        <div id="stick-aim" class="stick"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
